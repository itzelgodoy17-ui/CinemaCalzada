    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/bootstrap.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <title> Cine Calzada </title>
  </head>
  <body>
    <header>
      <h1> Cinema <br>Calzada </h1>
      <nav>
        <ul>
          <li><a href="./index.html"> INICIO </a></li>
          <li><a href="./Peliculas.html"> PELICULAS </a></li>

        </ul>
      </nav>
      <img src="./assets/img/logo de usuario.png" alt="Imagen de Usuario" id="LogoUsuario" />
    </header>

    <main>
  <section class="main-section">
    <article class="main-content">
      <h2> Peliculas en Taquilla </h2>
    </article>
  </section>
  
  <section id="contenedorPeliculas"></section>
</main>

 <!-- Modal para detalles de película -->
<div class="modal fade" id="modalPelicula" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-light">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitulo">Título de la Película</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-md-4">
            <img id="modalImagen" src="" class="img-fluid rounded" alt="Película">
          </div>
          <div class="col-md-8">
            <p><strong>Año:</strong> <span id="modalAnio"></span></p>
            <p><strong>Director:</strong> <span id="modalDirector"></span></p>
            <p><strong>Duración:</strong> <span id="modalDuracion"></span></p>
            <p><strong>Género:</strong> <span id="modalGenero"></span></p>
            <p><strong>Puntuación:</strong> <span id="modalRate"></span></p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-primary">Comprar Entrada</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="./scripts/bootstrap.js"></script> 

    

  </body>
