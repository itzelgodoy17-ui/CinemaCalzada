<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./styles/reset.css">
    <!-- <link rel="stylesheet" href="./styles/index.css"> -->
    <link rel="stylesheet" href="./styles/createMovies.css">


  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <title> Cine Calzada </title>
  </head>
  <body>
    <header>
      <h1> Cinema <br>Calzada </h1>
      <nav>
        <ul>
          <li><a href="./index.html"> INICIO </a></li>
          <li><a href="./Peliculas.html"> PELICULAS </a></li>
          <li><a href="./sacaTuEntrada.html"> PRECIO DE LAS ENTRADAS </a></li>
          <li><a href="./AñadirPeliculas.html"> AÑADIR PELICULAS </a></li>
        </ul>
      </nav>
      <img src="./assets/img/logo de usuario.png" alt="Imagen de Usuario" id="LogoUsuario" />
    </header>

    <main>
  <section class="main-section">
    <article class="main-content">
      <h2> Añade tu Pelicula </h2>

                <section class="contenedor tarjPeliculas">
                 <article>
                   <form class="form" id="formPelicula">
                      <label> Titulo </label>
                      <input type="text" id="titulo" placeholder="Nombre de la Pelicula" required/>
                
                      <label> Año </label>
                      <input type="number" id="anio" placeholder="Año de la pelicula" min="1888" max="2026" required/>
                
                      <label> Director </label>
                      <input type="text" id="director" placeholder="Nombre del Director" required/>
                
                      <label> Calificacion </label>
                      <input type="number" id="Calif" placeholder="Calificacion (1-10)" min="1" max="10" step="0.1" required/>
                
                      <label> Duracion </label>
                      <input type="text" id="duracion" placeholder="Ej: 2h 30min" required/>
                
                      <label> Genero </label>
                      <input type="text" id="genero" placeholder="Generos (separados por coma)" required/>
                
                      <label> URL Imagen </label>
                      <input type="url" id="imgUrl" placeholder="https://ejemplo.com/imagen.jpg" required/>
                
                      <div class="form-buttons">
                         <button type="submit"> Añadir </button>
                        <button type="reset" id="btnReset"> Limpiar </button>
                      </div>
                    </form>
                 </article>
               </section>
            
    </article>
  </section>
  
</main>

    <script src="./public/bundle.js"></script>

  </body>
</html>
